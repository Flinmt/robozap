server {
    listen 80;
    server_name worker.partnerbot.com.br;

    # Cliente: HVisao (worker local na 3002)
    location = /hvisao {
        return 302 /hvisao/;
    }
    location /hvisao/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /hvisao;
    }

    # Cliente: Servimed (worker local na 3003)
    location = /servimed {
        return 302 /servimed/;
    }
    location /servimed/ {
        proxy_pass http://127.0.0.1:3003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /servimed;
    }

    # Health do host/proxy
    location = / {
        return 200 "worker proxy ok\n";
        add_header Content-Type text/plain;
    }
}
